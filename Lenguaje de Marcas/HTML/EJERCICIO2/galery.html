<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 3 - Galería</title>
    <link rel="stylesheet" href="indexstyle.css">
</head>
<body>
    <header class="header">
        <h1>MIS EJERCICIOS HTML Y CSS CON FLEXBLOX</h1>
        <nav>
            <a href="index.html">Flexbox</a>
            <a href="galery.html">Galería Imágenes</a>
            <a href="info.html">Información</a>
        </nav>
    </header>

    <main class="container">
        <section class="gallery-section">
            <h2>Personas</h2>
            <div class="flex-container-gallery personas">
                <div class="avatar">
                    <img src="images/images/people/man.svg" alt="Persona 1">
                </div>
                <div class="avatar">
                    <img src="images/images/people/girl.svg" alt="Persona 2">
                </div>
                <div class="avatar">
                    <img src="images/images/people/girl-2.svg" alt="Persona 3">
                </div>
                <div class="avatar">
                    <img src="images/images/people/girl-3.svg" alt="Persona 4">
                </div>
                <div class="avatar">
                    <img src="images/images/people/girl-1.svg" alt="Persona 5">
                </div>
                <div class="avatar">
                    <img src="images/images/people/boy.svg" alt="Persona 6">
                </div>
            </div>
        </section>

        <section class="gallery-section">
            <h2>Iconos</h2>
            <div class="flex-container-gallery iconos">
                <div class="icon-circle">
                    <img src="images/images/iconos/blogger.svg" alt="Icono Mano">
                </div>
                <div class="icon-circle">
                    <img src="images/images/iconos/carrito.svg" alt="Icono Carrito">
                </div>
                <div class="icon-circle">
                    <img src="images/images/iconos/CSS.png" alt="Icono CCS">
                </div>
                <div class="icon-circle">
                    <img src="images/images/iconos/css3-logo.svg" alt="Icono CSS">
                </div>
                <div class="icon-circle">
                    <img src="images/images/iconos/facebook.svg" alt="Icono Facebook">
                </div>
                <div class="icon-circle">
                    <img src="images/images/iconos/google-plus.svg" alt="Icono Google Plus [cite: 30]">
                </div>
                <div class="icon-circle">
                    <img src="images/images/iconos/hard-disk.svg" alt="Icono HD">
                </div>
                <div class="icon-circle">
                    <img src="images/images/iconos/html5-logo.svg" alt="Icono HTML5 [cite: 31]">
                </div>
                <div class="icon-circle">
                    <img src="images/images/iconos/instagram.svg" alt="Icono Instagram">
                </div>
                <div class="icon-circle">
                    <img src="images/images/iconos/microfono1.svg" alt="Icono Micro">
                </div>
                <div class="icon-circle">
                    <img src="images/images/iconos/monitor.svg" alt="Icono Hongo">
                </div>
            </div>
        </section>
    </main>
</body>
</html>
