<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table, tr, td{
            border: 1px solid black;
            border-collapse: collapse;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Tabla usando colspan y rowspan</h1>
    <!--Para hacer una tabla con atajos table>tr*x>td*x -->
    <!--Para seleccionar varias filas alt+click en las filas que quieras-->
    <table>
        <tr>
            <td colspan="3" style="background-color: aquamarine;">f11</td>
            <!--
            <td>f12</td>
            <td>f13</td>
            -->
            <td>f14</td>
            <td>f15</td>
            <td>f16</td>
        </tr>
        <tr>
            <td rowspan="2" style="background-color:coral;">f21</td>
            <td>f22</td>
            <td>f23</td>
            <td>f24</td>
            <td>f25</td>
            <td>f26</td>
        </tr>
        <tr> <!--Para comentar una línea Ctrl+K+C-->
            <!--
            <td>f31</td>
            -->
            <td>f32</td>
            <td>f33</td>
            <td>f34</td>
            <td>f35</td>
            <td>f36</td>
        </tr>
        <tr>
            <td>f41</td>
            <td>f42</td>
            <td>f43</td>
            <td>f44</td>
            <td>f45</td>
            <td>f46</td>
        </tr>
    </table>
</body>
</html>
